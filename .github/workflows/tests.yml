name: Tests

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Fetch shared agentlib
        # local agents import ../common/agentlib.py — recreate the sibling
        # layout the laptop (and the fleet codespace) have
        run: git clone --depth 1 https://github.com/astroboy1183/common ../common

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s . -p "test_*.py" -v
